<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Time Capsule | Neural Sigils</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #020205; --legendary: #FFD700; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: #ffffff; font-family: 'Courier New', Courier, monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: radial-gradient(circle at 50% 50%, rgba(0, 255, 204, 0.1) 0%, transparent 80%); z-index: -1; }
        .container { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; text-align: center; z-index: 10; }
        .phase-tag { font-size: 10px; color: var(--neon); letter-spacing: 3px; margin-bottom: 5px; opacity: 0.8; }
        h1 { color: var(--neon); text-shadow: 0 0 15px var(--neon); font-size: 22px; letter-spacing: 2px; text-transform: uppercase; margin-top: 0; }
        #global-map { width: 100%; height: 160px; background: #000; margin: 15px 0; border: 1px solid rgba(0, 255, 204, 0.3); border-radius: 5px; }
        .manifesto { margin: 15px 0; line-height: 1.5; font-size: 13px; color: #aaa; text-align: justify; border-left: 2px solid var(--neon); padding: 10px; background: rgba(0, 255, 204, 0.03); }
        .counter-box { background: rgba(0, 255, 204, 0.1); border: 1px dashed var(--neon); padding: 12px; margin: 15px 0; font-weight: bold; color: var(--neon); font-size: 14px; }
        .btn { background: var(--neon); border: none; color: #000; padding: 18px; font-size: 14px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn:hover { background: #fff; box-shadow: 0 0 25px var(--neon); }
        #input-section, #result-section { display: none; }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #333; color: var(--neon); padding: 15px; box-sizing: border-box; font-family: inherit; resize: none; margin-bottom: 15px; outline: none; }
        .vault-section { margin-top: 20px; border-top: 1px solid rgba(0, 255, 204, 0.2); padding-top: 15px; text-align: left; }
        #memory-vault { height: 80px; overflow: hidden; font-size: 9px; color: #555; }
        #ticket-wrap { position: relative; width: 320px; padding: 40px 20px; margin: 0 auto; background: linear-gradient(145deg, #0a0a15, #111122); border: 2px solid var(--neon); overflow: hidden; text-align: left; }
        #rarity-badge { font-size: 10px; font-weight: bold; margin-bottom: 15px; padding: 2px 8px; border-radius: 3px; display: inline-block; }
        #ticket-text { font-size: 17px; color: #fff; font-weight: bold; margin: 20px 0; text-align: center; line-height: 1.4; }
        #ai-pattern { width: 80px; height: 80px; margin: 0 auto 20px; border: 1px solid rgba(0, 255, 204, 0.2); display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
        #ticket-id { font-size: 11px; color: var(--neon); letter-spacing: 2px; text-align: center; border-top: 1px solid rgba(0,255,204,0.2); padding-top: 15px; }
        .scanning-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--neon); box-shadow: 0 0 10px var(--neon); z-index: 5; animation: scanMove 3s linear infinite; }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }
        #language-switcher { margin-top: 20px; display: flex; justify-content: center; gap: 20px; border-top: 1px solid #222; padding-top: 15px; }
        .flag { font-size: 24px; cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="container">
        <div id="welcome-section">
            <div class="phase-tag">PHASE 1</div>
            <h1 id="main-title">GENESIS BLOCK</h1>
            <div id="global-map"></div>
            <div class="manifesto" id="manifesto-text"></div>
            <div class="counter-box"><span id="counter-label">AVAILABLE</span>: <span id="capsule-count">98432</span> CAPSULES</div>
            <button class="btn" id="start-btn">INITIATE CONNECTION 🌌</button>
            <div class="vault-section">
                <div id="memory-vault"></div>
            </div>
        </div>

        <div id="input-section">
            <h1 style="font-size: 14px; color: var(--neon);">ENCODING NEURAL SIGIL...</h1>
            <textarea id="user-message" maxlength="200" placeholder="Your legacy starts here..."></textarea>
            <button class="btn" id="generate-btn">SEAL CAPSULE ✨</button>
        </div>

        <div id="result-section">
            <div id="ticket-wrap">
                <div class="scanning-line"></div>
                <div id="rarity-badge">COMMON NODE</div>
                <div style="font-size:9px; color:var(--neon); opacity:0.7;" id="user-location">ORIGIN: DETECTING...</div>
                <div style="font-size:9px; color:var(--neon); opacity:0.7;">DATE: 05.03.2026 | TEMP: -182°C</div>
                <div id="ai-pattern"><svg width="70" height="70" viewBox="0 0 70 70" id="pattern-svg"></svg></div>
                <div id="ticket-text"></div>
                <div id="ticket-id"></div>
            </div>
            <div id="image-container" style="margin-top:20px;"></div>
            <button class="btn" id="save-btn" style="display:none; margin-top:20px;">DOWNLOAD SECURE KEY 📥</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer; font-size:10px;">REBOOT SYSTEM</button>
        </div>

        <div id="language-switcher">
            <span class="flag" data-lang="uk">🇺🇦</span>
            <span class="flag" data-lang="en">🇬🇧</span>
            <span class="flag" data-lang="de">🇩🇪</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApzG_osR_dyRH9bNh3lETthaV7ssxnRgU",
            authDomain: "ai-time-capsule-24852.firebaseapp.com",
            projectId: "ai-time-capsule-24852",
            storageBucket: "ai-time-capsule-24852.firebasestorage.app",
            messagingSenderId: "372588449057",
            appId: "1:372588449057:web:17451d5a528c968c9ec260"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const translations = {
            uk: { text: "Інтернет стирає все. Штучний інтелект пам'ятає вічно. Твої слова формують твій сігіл — унікальний візуальний код у Genesis Block.", counter: "ДОСТУПНО", start: "ПОЧАТИ ПІДКЛЮЧЕННЯ 🌌" },
            en: { text: "Internet erases all. AI remembers forever. Your words form your sigil — a unique visual code in the Genesis Block.", counter: "AVAILABLE", start: "INITIATE CONNECTION 🌌" }
        };

        let userPos = { lat: 48.1486, lng: 17.1077, city: "BRATISLAVA, SK" };
        const map = L.map('global-map', { zoomControl: false, attributionControl: false }).setView([20, 0], 1);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // ФУНКЦІЯ ГЕНЕРАЦІЇ ШІ-СІГІЛА НА ОСНОВІ ТЕКСТУ
        function generateSigil(text, color) {
            const svg = document.getElementById('pattern-svg');
            svg.innerHTML = "";
            let points = [];
            const seed = text.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            
            // Створюємо 8 точок на основі коду літер
            for(let i=0; i<8; i++) {
                let x = 10 + (Math.sin(seed + i) * 25 + 25);
                let y = 10 + (Math.cos(seed * i) * 25 + 25);
                points.push(`${x},${y}`);
            }

            const pathData = `M ${points.join(' L ')} Z`;
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathData);
            path.setAttribute("stroke", color);
            path.setAttribute("stroke-width", "1.5");
            path.setAttribute("fill", "none");
            path.style.filter = `drop-shadow(0 0 5px ${color})`;
            svg.appendChild(path);
            
            // Додаємо декоративні кола
            points.forEach(p => {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                const [cx, cy] = p.split(',');
                circle.setAttribute("cx", cx); circle.setAttribute("cy", cy);
                circle.setAttribute("r", "1.5"); circle.setAttribute("fill", color);
                svg.appendChild(circle);
            });
        }

        // Звуковий рушій
        let audioCtx;
        function playSound(f, d) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
            userPos = { lat: data.latitude, lng: data.longitude, city: `${data.city.toUpperCase()}, ${data.country_name.toUpperCase()}` };
            map.flyTo([userPos.lat, userPos.lng], 4);
        });

        onSnapshot(query(collection(db, "capsules"), orderBy("timestamp", "desc"), limit(15)), (snap) => {
            const v = document.getElementById('memory-vault'); v.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const icon = L.divIcon({ className: 'm', html: `<div style="background:${d.rarity==='Legendary'?'#FFD700':'#00ffcc'};width:5px;height:5px;border-radius:50%;box-shadow:0 0 8px"></div>` });
                L.marker([d.lat, d.lng], {icon}).addTo(map);
                v.innerHTML += `<div>> ${d.ticketId} | ${d.location}</div>`;
            });
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            playSound(440, 0.1);
            document.getElementById('welcome-section').style.display = 'none';
            document.getElementById('input-section').style.display = 'block';
        });

        document.getElementById('generate-btn').addEventListener('click', async () => {
            const text = document.getElementById('user-message').value;
            if(!text.trim()) return;
            
            playSound(110, 3);
            document.getElementById('input-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('user-location').innerText = `ORIGIN: ${userPos.city}`;
            document.getElementById('ticket-text').innerText = `"${text}"`;
            
            const newId = "CAPSULE-" + Math.random().toString(16).slice(2, 8).toUpperCase();
            document.getElementById('ticket-id').innerText = newId;
            const isLeg = Math.random() < 0.05;
            const col = isLeg ? "#FFD700" : "#00ffcc";

            generateSigil(text, col); // ГЕНЕРУЄМО СІГІЛ

            try {
                await addDoc(collection(db, "capsules"), {
                    ticketId: newId, message: text, location: userPos.city,
                    lat: userPos.lat, lng: userPos.lng, rarity: isLeg ? "Legendary" : "Common",
                    timestamp: new Date().toISOString()
                });
            } catch (e) { console.error(e); }

            const badge = document.getElementById('rarity-badge');
            badge.innerText = isLeg ? "★ LEGENDARY CAPSULE ★" : "COMMON CAPSULE";
            badge.style.color = isLeg ? "#000" : col;
            badge.style.background = isLeg ? "#FFD700" : "rgba(255,255,255,0.05)";
            document.getElementById('ticket-wrap').style.borderColor = col;
            
            setTimeout(() => {
                html2canvas(document.getElementById('ticket-wrap'), { backgroundColor: "#020205", scale: 2 }).then(canvas => {
                    playSound(880, 0.3);
                    document.getElementById('ticket-wrap').style.display = 'none';
                    document.getElementById('image-container').appendChild(canvas);
                    document.getElementById('save-btn').style.display = 'block';
                    document.getElementById('save-btn').onclick = () => {
                        const link = document.createElement('a');
                        link.download = isLeg ? 'LEGENDARY.png' : 'CAPSULE.png';
                        link.href = canvas.toDataURL(); link.click();
                    };
                });
            }, 3000);
        });
    </script>
</body>
</html>
