<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Time Capsule | Genesis Architect</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --neon: #00ffcc; --bg: #010204; --glass: rgba(0, 255, 204, 0.05); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Courier New', monospace; overflow-x: hidden; }
        .container { max-width: 420px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* HEADER STATS */
        .stats-bar { display: flex; justify-content: space-between; padding: 10px; background: var(--glass); border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 8px; margin-bottom: 20px; font-size: 10px; }
        .stat-item span { display: block; color: var(--neon); font-size: 14px; font-weight: bold; }

        .screen { display: none; animation: fadeIn 0.5s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { color: var(--neon); text-shadow: 0 0 10px var(--neon); font-size: 20px; text-transform: uppercase; text-align: center; }
        #global-map { width: 100%; height: 250px; border: 1px solid var(--neon); border-radius: 12px; margin: 20px 0; }
        
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid #333; color: var(--neon); padding: 10px; border-radius: 8px; font-size: 16px; outline: none; }
        .hint-tag { display: inline-block; background: rgba(0, 255, 204, 0.1); border: 1px solid var(--neon); color: var(--neon); padding: 5px 10px; border-radius: 15px; font-size: 11px; margin: 5px; cursor: pointer; }
        
        .action-btn { background: var(--neon); border: none; color: #000; padding: 15px; width: 100%; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        .editable-part { color: var(--neon); font-weight: bold; border-bottom: 1px dashed var(--neon); outline: none; }
        .manifesto-box { background: var(--glass); border-left: 3px solid var(--neon); padding: 15px; line-height: 1.6; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-bar">
        <div class="stat-item">NODES <span id="stat-nodes">0</span></div>
        <div class="stat-item">SEALED <span id="stat-sealed">0</span></div>
        <div class="stat-item">SLOTS <span id="stat-slots">100</span></div>
    </div>

    <div id="welcome-section" class="screen active">
        <h1>Global Network Active</h1>
        <div id="global-map"></div>
        <button class="action-btn" onclick="startProcess()">Створити маніфест 🌌</button>
    </div>

    <div id="input-section" class="screen">
        <h2 id="step-title" style="font-size: 14px; color: var(--neon);">Step 1</h2>
        <textarea id="user-msg"></textarea>
        <div id="smart-hints"></div>
        <button class="action-btn" onclick="handleNext()">Далі ⏳</button>
    </div>

    <div id="review-section" class="screen">
        <h1>Review Manifest</h1>
        <div id="review-text" class="manifesto-box"></div>
        <button class="action-btn" onclick="alert('Перехід до оплати...')">Запечатати 🔒</button>
    </div>
</div>

<script>
    // Logic for counting
    function animateValue(id, start, end, duration) {
        let obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = Math.floor(progress * (end - start) + start);
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }

    // Start stats
    window.onload = () => {
        animateValue("stat-nodes", 0, 1429, 2000);
        animateValue("stat-sealed", 0, 8562, 2500);
        animateValue("stat-slots", 0, 42, 1500);
        initMap();
    };

    function initMap() {
        const map = L.map('global-map', { zoomControl: false, attributionControl: false }).setView([20, 0], 1);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    }

    const aiSteps = [
        { q: "Яка цінність для вас найважливіша?", hints: ["Свобода...", "Любов...", "Знання..."] },
        { q: "Порада майбутньому:", hints: ["Будьте сміливими...", "Бережіть природу...", "Шукайте істину..."] },
        { q: "Ваш закон життя:", hints: ["Жити тут і зараз", "Творити добро", "Ніколи не здаватися"] }
    ];

    let currentStep = 0;
    let answers = [];

    function startProcess() {
        document.getElementById('welcome-section').classList.remove('active');
        document.getElementById('input-section').classList.add('active');
        loadStep();
    }

    function loadStep() {
        const step = aiSteps[currentStep];
        document.getElementById('step-title').innerText = `Крок ${currentStep + 1} / 3`;
        document.getElementById('user-msg').placeholder = step.q;
        document.getElementById('user-msg').value = "";
        const hintBox = document.getElementById('smart-hints');
        hintBox.innerHTML = "";
        step.hints.forEach(h => {
            const btn = document.createElement('span');
            btn.className = 'hint-tag';
            btn.innerText = h;
            btn.onclick = () => document.getElementById('user-msg').value = h;
            hintBox.appendChild(btn);
        });
    }

    function handleNext() {
        const val = document.getElementById('user-msg').value;
        if (!val) return;
        answers.push(val);
        if (currentStep < 2) {
            currentStep++;
            loadStep();
        } else {
            finalizeReview();
        }
    }

    function finalizeReview() {
        document.getElementById('input-section').classList.remove('active');
        document.getElementById('review-section').classList.add('active');
        const intros = ["Аналізуючи горизонт подій, я зрозумів, що ", "Крізь призму досвіду ясно: "];
        const reviewBox = document.getElementById('review-text');
        reviewBox.innerHTML = `<span>${intros[0]} ${answers[0]}. Порада: ${answers[1]}. Закон: </span><span contenteditable="true" class="editable-part">${answers[2]}</span>`;
    }
</script>
</body>
</html>
