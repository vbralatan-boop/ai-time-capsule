<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Time Capsule | Premium Global</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W982FVY94R"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --neon: #00ffcc; --bg: #010204; --glass: rgba(0, 255, 204, 0.05); }
        html { scroll-behavior: smooth; }
        body { margin: 0; background-color: var(--bg); color: #ffffff; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; text-align: center; z-index: 10; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; min-height: 100vh; }
        
        .screen { display: none; animation: fadeIn 0.8s ease-in-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--neon); text-shadow: 0 0 15px var(--neon); font-size: 24px; letter-spacing: 4px; text-transform: uppercase; margin: 0 0 10px; }
        .phase-info { font-size: 10px; color: var(--neon); letter-spacing: 5px; margin-bottom: 20px; opacity: 0.7; }
        
        #global-map { width: 100%; height: 220px; background: #000; margin: 15px 0; border: 1px solid var(--neon); border-radius: 12px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.1); }
        .manifesto-box { background: var(--glass); border-left: 4px solid var(--neon); padding: 15px; margin: 20px 0; text-align: justify; font-size: 13px; line-height: 1.6; color: #ccc; border-radius: 0 8px 8px 0; }
        
        .stats-panel { background: rgba(255, 255, 255, 0.02); border: 1px dashed rgba(0, 255, 204, 0.3); padding: 15px; margin: 15px 0; font-weight: bold; font-size: 14px; letter-spacing: 1px; display: flex; justify-content: space-around; text-align: center; border-radius: 8px;}
        .stat-item { display: flex; flex-direction: column; gap: 5px; }
        .stat-label { color: #fff; opacity: 0.7; font-size: 10px; }
        .stat-value { color: var(--neon); font-size: 16px; }

        .action-btn { background: var(--neon); border: none; color: #000; padding: 20px; font-size: 15px; font-weight: 900; border-radius: 10px; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2); margin-top: 10px; }
        .action-btn:hover { background: #ffffff; box-shadow: 0 0 30px var(--neon); }
        .stripe-btn { background: #635bff; color: white; box-shadow: 0 4px 15px rgba(99, 91, 255, 0.4); }

        textarea { width: 100%; height: 120px; background: #050505; border: 1px solid #333; color: var(--neon); padding: 15px; box-sizing: border-box; resize: none; margin-bottom: 10px; outline: none; border-radius: 10px; font-size: 16px; transition: 0.3s; }

        #capsule-visual { 
            position: relative; 
            width: 320px; 
            height: 568px; 
            margin: 0 auto; 
            background-image: url('https://i.postimg.cc/vHYxRr5f/1772900411494.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden; 
        }
        
        #capsule-message { 
            position: absolute;
            top: 45%; 
            left: 10%;
            width: 80%;
            font-size: 14px; 
            color: #ffffff; 
            font-weight: 800; 
            text-align: center; 
            line-height: 1.4; 
            text-shadow: 0 0 10px var(--neon), 0 0 20px #000; 
        }

        #qr-wrap { 
            position: absolute;
            bottom: 22%; 
            left: 50%;
            transform: translateX(-50%);
            width: 80px; 
            height: 80px; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 5px; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .meta-data { 
            position: absolute;
            bottom: 12%; 
            left: 10%;
            width: 80%;
            font-size: 10px; 
            color: rgba(255, 255, 255, 0.8); 
            text-align: center; 
            letter-spacing: 2px; 
            border-top: 1px dashed rgba(255, 255, 255, 0.2); 
            padding-top: 8px; 
            display: flex; 
            justify-content: space-between; 
            text-shadow: 0 0 5px #000; 
        }

        #capsule-footer { 
            position: absolute;
            bottom: 6%; 
            left: 10%;
            width: 80%;
            font-size: 12px; 
            color: var(--neon); 
            text-align: center; 
            letter-spacing: 4px; 
            font-weight: bold; 
            text-shadow: 0 0 5px #000; 
        }
        
        .laser-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #ffffff; box-shadow: 0 0 20px 5px var(--neon); animation: laserScan 3s linear infinite; z-index: 5; }
        @keyframes laserScan { 0% { top: 0%; opacity: 0; } 10% { opacity: 0.9; } 90% { opacity: 0.9; } 100% { top: 100%; opacity: 0; } }

        #live-vault { height: 70px; overflow: hidden; font-size: 10px; color: #555; margin-top: 20px; text-align: left; border-top: 1px solid #111; padding-top: 10px; line-height: 1.6; }
        #lang-selector { display: flex; justify-content: center; gap: 20px; margin-top: 40px; padding-top: 20px; border-top: 1px solid #111; }
        .lang-flag { font-size: 26px; cursor: pointer; transition: 0.3s; opacity: 0.4; filter: grayscale(100%); }
        .lang-flag.active, .lang-flag:hover { opacity: 1; filter: grayscale(0%); transform: scale(1.1); }

        #notification-area { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .live-toast { background: rgba(0, 255, 204, 0.1); border-left: 3px solid var(--neon); padding: 12px 15px; border-radius: 4px; font-size: 11px; color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(5px); animation: slideInRight 0.5s forwards, fadeOutToast 0.5s forwards 3.5s; font-family: monospace; }
        @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOutToast { to { opacity: 0; transform: translateY(-10px); } }
        
        .scroll-down { margin-top: 40px; font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 2px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; transform: translateY(0); } 50% { opacity: 1; transform: translateY(5px); } 100% { opacity: 0.4; transform: translateY(0); } }

        #registry-wall { margin-top: 40px; text-align: left; width: 100%; }
        .registry-title { font-size: 12px; color: #555; letter-spacing: 4px; text-align: center; margin-bottom: 20px; }
        .node-block { background: rgba(0, 255, 204, 0.03); border: 1px solid rgba(0, 255, 204, 0.2); border-left: 3px solid var(--neon); padding: 15px; margin-bottom: 15px; border-radius: 4px; position: relative; overflow: hidden; }
        .node-header { font-size: 10px; color: var(--neon); margin-bottom: 8px; letter-spacing: 1px; }
        .node-user { font-size: 12px; color: #fff; font-weight: bold; margin-bottom: 5px; }
        .node-frag { font-size: 12px; color: #aaa; line-height: 1.5; margin-bottom: 15px; }
        .encrypted { color: #ff0055; letter-spacing: 2px; font-size: 10px; }
        .unlock-btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 10px 15px; font-size: 11px; font-weight: bold; letter-spacing: 2px; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; border-radius: 4px; }
        .unlock-btn:hover { background: var(--neon); color: #000; }
        .hack-screen { font-size: 11px; color: var(--neon); display: none; padding: 10px 0; font-family: 'Courier New', monospace; }
        .priority-msg { color: #ff0055; font-weight: bold; font-size: 11px; margin-top: 10px; display: none; border-top: 1px dashed #ff0055; padding-top: 10px; text-align: center;}
        .share-action-btn { background: #ff0055; border: none; color: #fff; padding: 12px; width: 100%; font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; text-transform: uppercase; border-radius: 4px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <audio id="sound-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="sound-scan" src="https://assets.mixkit.co/active_storage/sfx/2861/2861-preview.mp3" preload="auto"></audio>

    <div id="notification-area"></div>

    <div class="container">
        <div id="welcome-section" class="screen active">
            <div class="phase-info" id="ui-phase" style="color: #555; letter-spacing: 8px;">PREMIUM NODE ACCESS</div>
            <h1 id="ui-title">ІНТЕРНЕТ СТИРАЄ ВСЕ.<br><span style="color: #fff; text-shadow: none;">AI ПАМ'ЯТАЄ.</span></h1>
            <div class="manifesto-box" id="ui-manifesto">AI Time Capsule — це перший цифровий монумент людства...</div>
            <div id="global-map"></div>
            <div class="stats-panel" id="stats-panel">
                <div class="stat-item"><span class="stat-label" id="ui-nodes-label">ВУЗЛИ</span><span class="stat-value" id="nodes-value">...</span></div>
                <div class="stat-item"><span class="stat-label" id="ui-sealed-label">ЗАПЕЧАТАНО</span><span class="stat-value" id="sealed-value">...</span></div>
                <div class="stat-item"><span class="stat-label" id="ui-slots-label">МІСЦЯ</span><span class="stat-value" id="slots-value">...</span></div>
            </div>
            <button class="action-btn" id="btn-init">СТВОРИТИ МОНУМЕНТ 🌌</button>
            <div id="live-vault"></div>
            <div class="scroll-down" id="ui-scroll">ПРОКРУТІТЬ ВНИЗ ДЛЯ ДЕТАЛЕЙ ↓</div>
        </div>

        <div id="input-section" class="screen">
            <h1 id="ui-sealing">ЗАПЕЧАТУВАННЯ КАПСУЛИ...</h1>
            <textarea id="user-msg" maxlength="200" placeholder="Введіть ваше послання..."></textarea>
            <button class="action-btn" id="btn-prep">ПІДГОТУВАТИ ДАНІ ⏳</button>
        </div>

        <div id="analysis-section" class="screen">
            <h1 id="ui-analysis-title">NEURAL ANALYSIS 🧠</h1>
            <div id="analysis-text" class="manifesto-box"></div>
        </div>

        <div id="payment-section" class="screen">
            <h1 id="ui-payment-title">SECURE GLOBAL NODE</h1>
            <div id="ui-pay-desc" class="manifesto-box">Текст зашифровано. Підтвердіть транзакцію.</div>
            <button class="action-btn stripe-btn" id="btn-pay">PAY 2€ WITH STRIPE 💳</button>
        </div>

        <div id="result-section" class="screen">
            <div id="capsule-visual">
                <div class="laser-line"></div>
                <div id="capsule-message"></div>
                <div id="qr-wrap"></div>
                <div class="meta-data"><span id="meta-time"></span><span id="meta-geo"></span></div>
                <div id="capsule-footer"></div>
            </div>
            <div id="final-image-container"></div>
            <button class="action-btn" id="btn-share" style="display:none;">ПОДІЛИТИСЯ 🚀</button>
            <button id="btn-reboot" onclick="location.reload()">ПЕРЕЗАВАНТАЖИТИ</button>
        </div>

        <div id="lang-selector">
            <span class="lang-flag active" id="flag-uk" onclick="changeLanguage('uk')">🇺🇦</span>
            <span class="lang-flag" id="flag-en" onclick="changeLanguage('en')">🇬🇧</span>
            <span class="lang-flag" id="flag-sk" onclick="changeLanguage('sk')">🇸🇰</span>
            <span class="lang-flag" id="flag-de" onclick="changeLanguage('de')">🇩🇪</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, getCountFromServer } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApzG_osR_dyRH9bNh3lETthaV7ssxnRgU",
            authDomain: "ai-time-capsule-24852.firebaseapp.com",
            projectId: "ai-time-capsule-24852",
            storageBucket: "ai-time-capsule-24852.firebasestorage.app",
            messagingSenderId: "372588449057",
            appId: "1:372588449057:web:17451d5a528c968c9ec260"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ДІКШИНАРІ ТА UI (ПОВНА ВЕРСІЯ) ---
        const localDatabase = {
            uk: { phase: "PREMIUM NODE ACCESS", start: "СТВОРИТИ МОНУМЕНТ 🌌", seal: "ЗАПЕЧАТУВАННЯ...", gen: "ПІДГОТУВАТИ ДАНІ ⏳", analysis: ["> Аналіз семантики...", "> Збір контексту світу...", "> Формування JSON контейнера...", "> Готово."], unlock_btn: "[ РОЗБЛОКУВАТИ ⚡ ]", share_btn: "ПОДІЛИТИСЯ 🔗" },
            en: { phase: "PREMIUM NODE ACCESS", start: "CREATE MONUMENT 🌌", seal: "SEALING...", gen: "PREPARE DATA ⏳", analysis: ["> Semantics analysis...", "> Gathering world context...", "> Forming JSON container...", "> Ready."], unlock_btn: "[ UNLOCK ⚡ ]", share_btn: "SHARE 🔗" }
            // ... (інші мови додаються аналогічно)
        };

        // --- КАРТА ТА ПОЗИЦІЯ ---
        let currentPos = { lat: 0, lng: 0, city: "GLOBAL NODE" };
        const map = L.map('global-map', { zoomControl: false, attributionControl: false }).setView([20, 0], 1);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
            currentPos = { lat: data.latitude, lng: data.longitude, city: `${data.city.toUpperCase()}, ${data.country_name.toUpperCase()}` };
            map.flyTo([currentPos.lat, currentPos.lng], 4);
        });

        // --- КРОК 2: НОВА ЛОГІКА ПІДГОТОВКИ ДАНИХ (JSON МЕТАДАНІ) ---
        document.getElementById('btn-prep').addEventListener('click', () => {
            const text = document.getElementById('user-msg').value;
            if(!text.trim()) return;

            // Формуємо наш історичний JSON-об'єкт
            const fullCapsuleData = {
                manifest_text: text,
                context_snapshot: {
                    global_context: {
                        btc_price_usd: 68500, // В майбутньому підключимо API
                        ai_model: "Gemini 3 Flash",
                        status: "Historical Record"
                    },
                    technical_dna: {
                        network: "Sepolia Ethereum",
                        storage: "IPFS/Pinata",
                        encryption: "AES-256"
                    }
                },
                timestamp: new Date().toISOString()
            };

            localStorage.setItem('capsuleText', text);
            localStorage.setItem('fullCapsuleJSON', JSON.stringify(fullCapsuleData));

            switchScreen('input-section', 'analysis-section');
            startAnalysisAnimation();
        });

        function startAnalysisAnimation() {
            const box = document.getElementById('analysis-text');
            box.innerHTML = "";
            const lines = ["> Аналіз семантики...", "> Збір контексту світу...", "> Формування JSON контейнера...", "> Захист AES-256 активовано."];
            let i = 0;
            const int = setInterval(() => {
                box.innerHTML += lines[i] + "<br>"; i++;
                if(i >= lines.length) {
                    clearInterval(int);
                    setTimeout(() => switchScreen('analysis-section', 'payment-section'), 1000);
                }
            }, 800);
        }

        // --- ФІНАЛЬНА ГЕНЕРАЦІЯ ТА ЗБЕРЕЖЕННЯ ---
        async function generateFinalCapsule(finalText) {
            const capsuleId = "CAPSULE-" + Math.random().toString(16).slice(2, 8).toUpperCase();
            document.getElementById('capsule-message').innerText = `"${finalText}"`;
            document.getElementById('capsule-footer').innerText = capsuleId;
            
            // Відображаємо метадані на картці
            const now = new Date();
            document.getElementById('meta-time').innerText = `T: ${now.toISOString().slice(0,10)}`;
            document.getElementById('meta-geo').innerText = `GEO: ${currentPos.lat.toFixed(2)}, ${currentPos.lng.toFixed(2)}`;

            new QRCode(document.getElementById('qr-wrap'), { text: capsuleId, width: 70, height: 70 });

            // Зберігаємо в Firebase (включаючи наш новий JSON)
            const jsonData = JSON.parse(localStorage.getItem('fullCapsuleJSON'));
            try { 
                await addDoc(collection(db, "capsules"), { 
                    ticketId: capsuleId, 
                    message: finalText, 
                    metadata: jsonData.context_snapshot,
                    location: currentPos.city, 
                    timestamp: now.toISOString() 
                }); 
            } catch (e) { console.error(e); }

            // Перетворення в картинку для Stories
            setTimeout(() => {
                html2canvas(document.getElementById('capsule-visual'), { backgroundColor: "#020205" }).then(canvas => {
                    document.getElementById('capsule-visual').style.display = 'none';
                    document.getElementById('final-image-container').appendChild(canvas);
                    document.getElementById('btn-share').style.display = 'block';
                });
            }, 2000);
        }

        // --- ДОПОМІЖНІ ФУНКЦІЇ ---
        window.switchScreen = function(from, to) {
            document.getElementById(from).classList.remove('active');
            document.getElementById(to).classList.add('active');
        };

        window.addEventListener('DOMContentLoaded', () => {
            if (window.location.search.includes('status=success')) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('result-section').classList.add('active');
                generateFinalCapsule(localStorage.getItem('capsuleText'));
            }
        });

        document.getElementById('btn-init').onclick = () => switchScreen('welcome-section', 'input-section');
        document.getElementById('btn-pay').onclick = () => {
            window.location.href = "https://buy.stripe.com/test_14A8wQgA4gCN9m19uN38400";
        };
    </script>
</body>
</html>
