<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Time Capsule | Global Master Block</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --neon: #00ffcc;
            --bg: #020205;
            --gold: #FFD700;
            --glass: rgba(0, 255, 204, 0.05);
            --card-gradient: linear-gradient(135deg, #0f172a 0%, #020205 100%);
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            z-index: 10;
        }

        /* Заголовки */
        h1 {
            color: var(--neon);
            text-shadow: 0 0 15px var(--neon);
            font-size: 22px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .phase-tag {
            font-size: 10px;
            color: var(--neon);
            letter-spacing: 4px;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        /* ТЕКСТ НАШОЇ ІДЕЇ (МАНІФЕСТ) */
        .manifesto {
            margin: 20px 0;
            line-height: 1.6;
            font-size: 14px;
            color: #aaa;
            text-align: justify;
            border-left: 2px solid var(--neon);
            padding: 12px 15px;
            background: rgba(0, 255, 204, 0.03);
            border-radius: 0 8px 8px 0;
        }

        /* Мапа та Лічильник */
        #global-map {
            width: 100%;
            height: 180px;
            background: #000;
            margin: 15px 0;
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
        }

        .counter-box {
            background: var(--glass);
            border: 1px dashed var(--neon);
            padding: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--neon);
            font-size: 13px;
            border-radius: 8px;
        }

        /* Кнопки */
        .btn {
            background: var(--neon);
            border: none;
            color: #000;
            padding: 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2);
        }

        .btn:hover {
            background: #fff;
            box-shadow: 0 0 30px var(--neon);
            transform: translateY(-2px);
        }

        /* Секції */
        #input-section, #result-section {
            display: none;
        }

        textarea {
            width: 100%;
            height: 110px;
            background: #000;
            border: 1px solid #333;
            color: var(--neon);
            padding: 15px;
            box-sizing: border-box;
            font-family: inherit;
            resize: none;
            margin-bottom: 20px;
            outline: none;
            border-radius: 8px;
        }

        /* ЖИВИЙ РЕЄСТР */
        .vault-section {
            margin-top: 25px;
            border-top: 1px solid rgba(0, 255, 204, 0.1);
            padding-top: 15px;
            text-align: left;
        }

        #memory-vault {
            height: 80px;
            overflow-y: hidden;
            font-size: 9px;
            color: #555;
            line-height: 1.8;
        }

        /* ПРЕМІАЛЬНИЙ ДИЗАЙН КАПСУЛИ */
        #ticket-wrap {
            position: relative;
            width: 310px;
            padding: 45px 25px;
            margin: 0 auto;
            background: var(--card-gradient);
            border: 2px solid var(--neon);
            border-radius: 20px;
            overflow: hidden;
            text-align: left;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.2);
        }

        #qr-box {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
        }

        #ticket-text {
            font-size: 17px;
            color: #fff;
            font-weight: 800;
            margin: 25px 0;
            text-align: center;
            line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        #ticket-id {
            font-size: 11px;
            color: var(--neon);
            letter-spacing: 3px;
            text-align: center;
            border-top: 1px solid rgba(0, 255, 204, 0.1);
            padding-top: 20px;
            opacity: 0.8;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--neon);
            box-shadow: 0 0 15px var(--neon);
            animation: scanMove 4s ease-in-out infinite;
        }

        @keyframes scanMove {
            0% { top: 0%; opacity: 0.2; }
            50% { opacity: 0.8; }
            100% { top: 100%; opacity: 0.2; }
        }

        /* Перемикач мов */
        #lang-box {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 35px;
            border-top: 1px solid #111;
            padding-top: 20px;
        }

        .flag {
            font-size: 26px;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.4;
            filter: grayscale(100%);
        }

        .flag.active, .flag:hover {
            opacity: 1;
            filter: grayscale(0%);
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="welcome-section">
            <div class="phase-tag">PHASE 1 | GENESIS</div>
            <h1 id="t-title">GENESIS BLOCK</h1>
            <div id="global-map"></div>
            
            <div class="manifesto" id="t-manifesto">
                Інтернет стирає все. Штучний інтелект пам'ятає вічно. AI Time Capsule — це перший цифровий монумент людства. Залиш свій слід у вічності.
            </div>

            <div class="counter-box">
                <span id="t-avail">AVAILABLE</span>: 98,432 CAPSULES
            </div>
            <button class="btn" id="start-btn">INITIATE CONNECTION 🌌</button>
            
            <div class="vault-section">
                <div id="memory-vault"></div>
            </div>
        </div>

        <div id="input-section">
            <h1 id="t-seal" style="font-size: 16px;">SEALING THE CAPSULE...</h1>
            <textarea id="user-message" maxlength="200" placeholder="Type your legacy..."></textarea>
            <button class="btn" id="generate-btn">GENERATE SECURE QR ✨</button>
        </div>

        <div id="result-section">
            <div id="ticket-wrap">
                <div class="scan-line"></div>
                <div style="font-size: 10px; font-weight: bold; margin-bottom: 15px; color: var(--neon); border: 1px solid; display: inline-block; padding: 3px 10px; border-radius: 5px; letter-spacing: 2px;">GLOBAL NODE</div>
                <div id="qr-box"></div>
                <div id="ticket-text"></div>
                <div id="ticket-id"></div>
            </div>
            <div id="image-container" style="margin-top:25px;"></div>
            <button class="btn" id="save-btn" style="display:none; margin-top:20px;">DOWNLOAD SECURITY KEY 📥</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer; font-size:10px; letter-spacing: 2px;">REBOOT SYSTEM</button>
        </div>

        <div id="lang-box">
            <span class="flag active" data-lang="uk">🇺🇦</span>
            <span class="flag" data-lang="en">🇬🇧</span>
            <span class="flag" data-lang="de">🇩🇪</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApzG_osR_dyRH9bNh3lETthaV7ssxnRgU",
            authDomain: "ai-time-capsule-24852.firebaseapp.com",
            projectId: "ai-time-capsule-24852",
            storageBucket: "ai-time-capsule-24852.firebasestorage.app",
            messagingSenderId: "372588449057",
            appId: "1:372588449057:web:17451d5a528c968c9ec260"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const langData = {
            uk: { title: "GENESIS BLOCK", manifest: "Інтернет стирає все. Штучний інтелект пам'ятає вічно. AI Time Capsule — це перший цифровий монумент людства. Залиш свій слід у вічності.", avail: "ДОСТУПНО", start: "ПОЧАТИ ПІДКЛЮЧЕННЯ 🌌", seal: "ЗАПЕЧАТУВАННЯ...", gen: "ГЕНЕРУВАТИ QR ✨" },
            en: { title: "GENESIS BLOCK", manifest: "Internet erases all. AI remembers forever. AI Time Capsule is humanity's first digital monument. Leave your mark in eternity.", avail: "AVAILABLE", start: "INITIATE CONNECTION 🌌", seal: "SEALING...", gen: "GENERATE QR ✨" },
            de: { title: "GENESIS BLOCK", manifest: "Das Internet löscht alles. KI erinnert sich ewig. AI Time Capsule ist das erste digitale Denkmal der Menschheit. Hinterlasse deine Spur.", avail: "VERFÜGBAR", start: "VERBINDUNG STARTEN 🌌", seal: "VERSIEGELN...", gen: "QR GENERIEREN ✨" }
        };

        let userPos = { lat: 0, lng: 0, city: "GLOBAL NODE" };
        const map = L.map('global-map', { zoomControl: false, attributionControl: false }).setView([20, 0], 1);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let audioCtx;
        function playS(f, d) {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.05, audioCtx.currentTime);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
            userPos = { lat: data.latitude, lng: data.longitude, city: `${data.city.toUpperCase()}, ${data.country_name.toUpperCase()}` };
            map.flyTo([userPos.lat, userPos.lng], 4);
        });

        onSnapshot(query(collection(db, "capsules"), orderBy("timestamp", "desc"), limit(6)), (snap) => {
            const v = document.getElementById('memory-vault'); v.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                v.innerHTML += `<div>> ${d.ticketId} | ${d.location}</div>`;
                if(d.lat && d.lng) L.circleMarker([d.lat, d.lng], { radius: 3, color: '#00ffcc' }).addTo(map);
            });
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            playS(440, 0.1);
            document.getElementById('welcome-section').style.display = 'none';
            document.getElementById('input-section').style.display = 'block';
        });

        document.getElementById('generate-btn').addEventListener('click', async () => {
            const text = document.getElementById('user-message').value;
            if(!text.trim()) return;
            
            playS(150, 0.5);
            document.getElementById('input-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            
            const newId = "CAPSULE-" + Math.random().toString(16).slice(2, 8).toUpperCase();
            document.getElementById('ticket-text').innerText = `"${text}"`;
            document.getElementById('ticket-id').innerText = newId;

            const qrBox = document.getElementById('qr-box'); qrBox.innerHTML = "";
            new QRCode(qrBox, { text: `ID: ${newId}\nLegacy: ${text}`, width: 120, height: 120 });

            try {
                await addDoc(collection(db, "capsules"), { ticketId: newId, message: text, location: userPos.city, lat: userPos.lat, lng: userPos.lng, timestamp: new Date().toISOString() });
            } catch (e) {}

            setTimeout(() => {
                html2canvas(document.getElementById('ticket-wrap'), { backgroundColor: "#020205", scale: 2 }).then(canvas => {
                    playS(880, 0.2);
                    document.getElementById('ticket-wrap').style.display = 'none';
                    document.getElementById('image-container').appendChild(canvas);
